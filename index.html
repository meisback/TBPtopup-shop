<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TBP Shop</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 380px; }
        .logo { font-size: 24px; font-weight: bold; color: #003366; margin-bottom: 20px; }
        .google-btn { display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; margin-bottom: 20px; transition: 0.3s; }
        .google-btn:hover { background: #f1f1f1; }
        .divider { margin: 20px 0; color: #888; font-size: 14px; position: relative; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; background: #fafafa; }
        .login-btn { width: 100%; padding: 12px; background: #003366; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">TOP UP BUZZ</div>
    <div class="google-btn" onclick="googleLogin()">
        <img src="https://img.icons8.com/color/24/000000/google-logo.png" style="margin-right:10px;"> Login with Google
    </div>
    <div class="divider">Or sign in with credentials</div>
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button class="login-btn" onclick="manualLogin()">Login</button>
</div>

<script>
    function manualLogin() {
        // এই ডাটা ফায়ারবেসে যাবে
        localStorage.setItem('userName', 'User');
        localStorage.setItem('userEmail', document.getElementById('email').value);
        window.location.href = "order.html";
    }
    function googleLogin() {
        // গুগল লগইন সিমুলেশন
        localStorage.setItem('userName', 'Ashraful Islam');
        localStorage.setItem('userEmail', 'ashraful@gmail.com');
        localStorage.setItem('userPic', 'https://via.placeholder.com/80');
        window.location.href = "order.html";
    }
</script>

</body>
</html>
