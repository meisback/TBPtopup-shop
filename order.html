<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TBP Shop</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fc; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 20px 0; }
        .profile-section { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #003366; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-value { font-size: 18px; font-weight: bold; color: #003366; }
        .stat-label { font-size: 12px; color: #888; }
        .info-box { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #003366; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://via.placeholder.com/150x40?text=TOP+UP+BUZZ" alt="Logo">
</div>

<div class="profile-section">
    <img id="uPic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-img">
    <h3 id="uName">Hi, User</h3>
    <p style="font-size: 14px; color: #003366;">Available Balance: ৳ 0</p>
</div>

<div class="stats-grid">
    <div class="stat-card"><div class="stat-value">267153</div><div class="stat-label">Support Pin</div></div>
    <div class="stat-card"><div class="stat-value">৳ 0</div><div class="stat-label">Weekly Spent</div></div>
    <div class="stat-card"><div class="stat-value">৳ 0</div><div class="stat-label">Total Spent</div></div>
    <div class="stat-card"><div class="stat-value">0</div><div class="stat-label">Total Order</div></div>
</div>

<div class="info-box">
    <strong>User Information</strong><br>
    <span style="font-size: 13px;" id="uEmail">email: user@gmail.com</span>
</div>

<script>
    document.getElementById('uName').innerText = "Hi, " + (localStorage.getItem('userName') || "User");
    document.getElementById('uEmail').innerText = "email: " + (localStorage.getItem('userEmail') || "N/A");
</script>

</body>
</html>
