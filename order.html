<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBP Rita Top Up - Order</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
        .card { background: #fff; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #ff9900; margin: 10px 0; }
        .welcome-user { font-size: 14px; background: #fff9f0; color: #d48600; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; max-height: 250px; overflow-y: auto; padding: 5px; }
        .option { border: 1px solid #ddd; padding: 12px; border-radius: 12px; cursor: pointer; background: #fff; font-size: 14px; font-weight: bold; }
        .selected { border-color: #ff9900 !important; background: #ff9900 !important; color: white !important; }
        .order-btn { width: 100%; padding: 15px; background: #25d366; color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>TBP Rita Top Up</h2>
    <div class="welcome-user">প্যাকেজ সিলেক্ট করে অর্ডার করুন</div>
    
    <input type="number" id="playerID" placeholder="প্লেয়ার আইডি (UID) দিন">

    <div class="grid">
        <div class="option" onclick="selectPkg(this, '১১৫ 💎 - ৮০৳')">১১৫ 💎<br>৮০ ৳</div>
        <div class="option" onclick="selectPkg(this, '২৪০ 💎 - ১৬০৳')">২৪০ 💎<br>১৬০ ৳</div>
        <div class="option" onclick="selectPkg(this, '৩৫৫ 💎 - ২৪০৳')">৩৫৫ 💎<br>২৪০ ৳</div>
        <div class="option" onclick="selectPkg(this, '৪৮০ 💎 - ৩৩০৳')">৪৮০ 💎<br>৩৩০ ৳</div>
        <div class="option" onclick="selectPkg(this, '৬১০ 💎 - ৪১০৳')">৬১০ 💎<br>৪১০ ৳</div>
        <div class="option" onclick="selectPkg(this, '৭২৫ 💎 - ৫১০৳')">৭২৫ 💎<br>৫১০ ৳</div>
        <div class="option" onclick="selectPkg(this, '৮৫০ 💎 - ৫৯০৳')">৮৫০ 💎<br>৫৯০ ৳</div>
        <div class="option" onclick="selectPkg(this, 'Monthly - ৭৮০৳')">Monthly<br>৭৮০ ৳</div>
    </div>

    <button class="order-btn" onclick="orderNow()">অর্ডার করুন (WhatsApp)</button>
    <p style="font-size: 12px; color: #888; margin-top: 15px;">নগদ: 01648117182</p>
</div>

<script>
    let chosenPkg = "";

    function selectPkg(element, val) {
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
        chosenPkg = val;
    }

    function orderNow() {
        let id = document.getElementById('playerID').value;
        if(!id || !chosenPkg) {
            alert("সব তথ্য সঠিকভাবে দিন!");
            return;
        }

        let myWhatsApp = "8801648117182"; 
        let message = "*নতুন অর্ডার - TBP Rita Top Up*\n\n" +
                      "🆔 প্লেয়ার আইডি: " + id + "\n" +
                      "💎 প্যাকেজ: " + chosenPkg;
        
        window.open("https://wa.me/" + myWhatsApp + "?text=" + encodeURIComponent(message));
    }
</script>

</body>
</html>
